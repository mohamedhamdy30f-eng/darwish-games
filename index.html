<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هل يشغّل جهازك؟ Pro | فحص متقدم للألعاب</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --accent: #06b6d4;
            --dark: #0f172a;
            --darker: #020617;
            --card: #1e293b;
            --card-hover: #334155;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --integrated: #8b5cf6;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--darker);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(236, 72, 153, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(6, 182, 212, 0.1) 0%, transparent 50%);
        }

        .floating-shapes {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
            animation: float 20s infinite ease-in-out;
        }

        .shape:nth-child(1) {
            width: 80px;
            height: 80px;
            background: var(--primary);
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .shape:nth-child(2) {
            width: 120px;
            height: 120px;
            background: var(--secondary);
            top: 60%;
            right: 10%;
            animation-delay: 5s;
        }

        .shape:nth-child(3) {
            width: 60px;
            height: 60px;
            background: var(--accent);
            bottom: 20%;
            left: 30%;
            animation-delay: 10s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            33% { transform: translateY(-30px) rotate(120deg); }
            66% { transform: translateY(20px) rotate(240deg); }
        }

        header {
            padding: 20px 0;
            text-align: center;
            position: relative;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            -webkit-text-fill-color: white;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 20px 10px rgba(99, 102, 241, 0); }
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .steps-wrapper {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            background: var(--card);
            border-radius: 50px;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .step.active {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }

        .step.completed {
            border-color: var(--success);
            background: rgba(34, 197, 94, 0.1);
        }

        .step-number {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--card-hover);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .step.active .step-number {
            background: var(--primary);
            color: white;
        }

        .step.completed .step-number {
            background: var(--success);
            color: white;
        }

        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title .icon {
            font-size: 1.8rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .form-group {
            margin-bottom: 5px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            color: var(--text);
            font-size: 0.95rem;
        }

        .form-group label .hint {
            color: var(--text-muted);
            font-weight: 400;
            font-size: 0.85rem;
        }

        /* Custom Searchable Select */
        .searchable-select {
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 14px 18px;
            background: var(--darker);
            border: 2px solid var(--card-hover);
            border-radius: 12px;
            color: var(--text);
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .dropdown-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            max-height: 300px;
            overflow-y: auto;
            background: var(--card);
            border: 2px solid var(--card-hover);
            border-top: none;
            border-radius: 0 0 12px 12px;
            z-index: 1000;
            display: none;
            margin-top: -5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .dropdown-list.show {
            display: block;
        }

        .dropdown-item {
            padding: 12px 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dropdown-item:hover {
            background: var(--primary);
            color: white;
        }

        .dropdown-item .item-icon {
            font-size: 1.2rem;
        }

        .dropdown-item .item-info {
            display: flex;
            flex-direction: column;
        }

        .dropdown-item .item-name {
            font-weight: 700;
        }

        .dropdown-item .item-meta {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        .dropdown-category {
            padding: 8px 18px;
            background: var(--darker);
            font-weight: 800;
            font-size: 0.85rem;
            color: var(--primary);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .selected-display {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 18px;
            background: var(--darker);
            border: 2px solid var(--primary);
            border-radius: 12px;
            color: var(--text);
            font-weight: 700;
            margin-top: 8px;
        }

        .selected-display .remove-btn {
            margin-right: auto;
            cursor: pointer;
            color: var(--danger);
            font-size: 1.2rem;
            padding: 0 5px;
        }

        /* GPU Type Toggle */
        .gpu-type-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .toggle-btn {
            padding: 10px 20px;
            border: 2px solid var(--card-hover);
            background: var(--darker);
            color: var(--text);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Tajawal', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
        }

        .toggle-btn:hover {
            border-color: var(--primary);
        }

        .toggle-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .integrated-section {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .integrated-section.show {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Motherboard Grid */
        .mb-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .mb-card {
            padding: 12px;
            background: var(--darker);
            border: 2px solid var(--card-hover);
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
        }

        .mb-card:hover {
            border-color: var(--integrated);
            transform: translateY(-2px);
        }

        .mb-card.selected {
            border-color: var(--integrated);
            background: rgba(139, 92, 246, 0.1);
        }

        .mb-chipset {
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--integrated);
        }

        .mb-socket {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Tier Badges */
        .tier-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .tier-entry {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        .tier-mid {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }

        .tier-high {
            background: rgba(34, 197, 94, 0.2);
            color: var(--success);
        }

        .tier-enthusiast {
            background: rgba(139, 92, 246, 0.2);
            color: var(--integrated);
        }

        /* Games Grid */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .game-card {
            background: var(--darker);
            border: 2px solid var(--card-hover);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 0;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .game-card.selected {
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.3);
        }

        .game-card.selected::before {
            opacity: 0.1;
        }

        .game-card > * {
            position: relative;
            z-index: 1;
        }

        .game-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: block;
        }

        .game-name {
            font-weight: 700;
            font-size: 0.95rem;
        }

        .game-genre {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .game-year {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 3px;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px 40px;
            border: none;
            border-radius: 14px;
            font-family: 'Tajawal', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: var(--card-hover);
            color: var(--text);
        }

        .btn-secondary:hover {
            background: var(--card);
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        /* Results */
        .result-section {
            display: none;
            animation: slideUp 0.6s ease;
        }

        .result-section.show {
            display: block;
        }

        .result-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .result-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: 900;
            margin-bottom: 20px;
            animation: scaleIn 0.5s ease;
        }

        @keyframes scaleIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .badge-success {
            background: rgba(34, 197, 94, 0.2);
            color: var(--success);
            border: 2px solid var(--success);
        }

        .badge-warning {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
            border: 2px solid var(--warning);
        }

        .badge-danger {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
            border: 2px solid var(--danger);
        }

        .performance-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .perf-card {
            background: var(--darker);
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease;
        }

        .perf-card:hover {
            transform: translateY(-5px);
        }

        .perf-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 10px;
            font-weight: 500;
        }

        .perf-value {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 5px;
        }

        .perf-sub {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .perf-bar {
            width: 100%;
            height: 8px;
            background: var(--card);
            border-radius: 4px;
            margin-top: 15px;
            overflow: hidden;
            position: relative;
        }

        .perf-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .perf-bar-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .comparison-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .comparison-table th,
        .comparison-table td {
            padding: 15px;
            text-align: right;
            border-bottom: 1px solid var(--card-hover);
        }

        .comparison-table th {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .comparison-table td {
            font-weight: 700;
        }

        .spec-yours {
            color: var(--accent);
        }

        .spec-required {
            color: var(--secondary);
        }

        .spec-status {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .status-pass {
            background: rgba(34, 197, 94, 0.2);
            color: var(--success);
        }

        .status-fail {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        .status-warn {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }

        .fps-gauge {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            position: relative;
        }

        .fps-gauge svg {
            transform: rotate(-90deg);
        }

        .fps-gauge-bg {
            fill: none;
            stroke: var(--card);
            stroke-width: 15;
        }

        .fps-gauge-fill {
            fill: none;
            stroke-width: 15;
            stroke-linecap: round;
            transition: stroke-dashoffset 1.5s ease;
        }

        .fps-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .fps-number {
            font-size: 3rem;
            font-weight: 900;
            line-height: 1;
        }

        .fps-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .settings-preview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .setting-item {
            background: var(--darker);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .setting-name {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .setting-value {
            font-weight: 800;
            font-size: 1.1rem;
        }

        .setting-high { color: var(--success); }
        .setting-medium { color: var(--warning); }
        .setting-low { color: var(--danger); }

        .tips-card {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(236, 72, 153, 0.1));
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        .tips-list {
            list-style: none;
            margin-top: 15px;
        }

        .tips-list li {
            padding: 10px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tips-list li:last-child {
            border-bottom: none;
        }

        .tip-icon {
            font-size: 1.2rem;
        }

        /* Loading */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 6, 23, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }

        .loading-overlay.show {
            display: flex;
        }

        .loader {
            width: 80px;
            height: 80px;
            border: 4px solid var(--card);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text);
        }

        .loading-sub {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--darker);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--card-hover);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        .hidden {
            display: none !important;
        }

        .section {
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Search highlight */
        .highlight {
            background: rgba(99, 102, 241, 0.3);
            color: white;
            padding: 0 2px;
            border-radius: 3px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .logo {
                font-size: 1.5rem;
            }
            
            .card {
                padding: 20px;
            }
            
            .games-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
            
            .btn-group {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }

            .dropdown-list {
                max-height: 250px;
            }
        }

        /* Category filters */
        .category-filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-chip {
            padding: 8px 16px;
            background: var(--darker);
            border: 2px solid var(--card-hover);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .filter-chip:hover {
            border-color: var(--primary);
        }

        .filter-chip.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        /* Benchmark score display */
        .bench-score {

        function initSearchableSelect(type, db) {
            const searchInput = document.getElementById(`${type}Search`);

            });

            });

                'enthusiast': { label: 'احترافي (Enthusiast)', icon: '💎' }
            };
            
            const grouped = {};
            Object.entries(db).forEach(([id, item]) => {
                if (!query || item.name.toLowerCase().includes(query.toLowerCase()) || 
                    item.socket.toLowerCase().includes(query.toLowerCase())) {
                    if (!grouped[item.tier]) grouped[item.tier] = [];
                    grouped[item.tier].push({ id, ...item });
                }
            });
            
            Object.entries(tiers).forEach(([tier, info]) => {
                if (grouped[tier]) {
                    items.push(`<div class="dropdown-category">${info.icon} ${info.label}</div>`);
                    grouped[tier].forEach(item => {
                        const benchBar = `<div class="bench-bar"><div class="bench-bar-fill" style="width: ${item.score}%; background: ${getTierColor(tier)}"></div></div>`;
                        items.push(`
                            <div class="dropdown-item" onclick="selectItem('${type}', '${item.id}')">
                                <span class="item-icon">${type === 'cpu' ? '🔲' : '🎮'}</span>
                                <div class="item-info">
                                    <div class="item-name">${item.name}</div>
                                    <div class="item-meta">${item.socket} | ${item.year} | الأداء: ${item.score}/100 ${benchBar}</div>
                                </div>
                            </div>
                        `);
                    });
                }
            });
            
            dropdown.innerHTML = items.join('');
            dropdown.classList.add('show');
        }

        function getTierColor(tier) {
            const colors = {
                'entry': 'var(--danger)',
                'mid': 'var(--warning)',
                'high': 'var(--success)',
                'enthusiast': 'var(--integrated)'
            };
            return colors[tier] || 'var(--text-muted)';
        }

        function selectItem(type, id) {
            const db = type === 'cpu' ? cpuDB : gpuDB;
            const item = db[id];
            
            if (type === 'cpu') {
                selectedCpu = { id, ...item };
                document.getElementById('cpuSelectedText').innerHTML = `
                    <span style="color: var(--primary)">${item.name}</span>
                    <span style="color: var(--text-muted); font-size: 0.85rem; margin-right: 10px;">
                        (${item.socket} | أداء: ${item.score}/100)
                    </span>
                `;
                document.getElementById('cpuSelected').classList.remove('hidden');
                document.getElementById('cpuSearch').value = '';
                document.getElementById('cpuDropdown').classList.remove('show');
            } else {
                selectedGpu = { id, ...item };
                document.getElementById('gpuSelectedText').innerHTML = `
                    <span style="color: var(--primary)">${item.name}</span>
                    <span style="color: var(--text-muted); font-size: 0.85rem; margin-right: 10px;">
                        (${item.vram}GB VRAM | أداء: ${item.score}/100)
                    </span>
                `;
                document.getElementById('gpuSelected').classList.remove('hidden');
                document.getElementById('gpuSearch').value = '';
                document.getElementById('gpuDropdown').classList.remove('show');
            }
        }

        function clearSelection(type) {
            if (type === 'cpu') {
                selectedCpu = null;
                document.getElementById('cpuSelected').classList.add('hidden');
            } else {
                selectedGpu = null;
                document.getElementById('gpuSelected').classList.add('hidden');
            }
        }

        // ==================== GPU TYPE TOGGLE ====================
        function setGpuType(type) {
            gpuType = type;
            
            document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(type === 'dedicated' ? 'gpuDedicated' : 'gpuIntegrated').classList.add('active');
            
            if (type === 'dedicated') {
                document.getElementById('dedicatedGpuSection').classList.remove('hidden');
                document.getElementById('integratedGpuSection').classList.remove('show');
            } else {
                document.getElementById('dedicatedGpuSection').classList.add('hidden');
                document.getElementById('integratedGpuSection').classList.add('show');
            }
        }

        // ==================== MOTHERBOARD SELECTION ====================
        function populateMotherboards() {
            const grid = document.getElementById('mbGrid');
            grid.innerHTML = Object.entries(integratedDB).map(([id, mb]) => `
                <div class="mb-card" onclick="selectMotherboard('${id}')" data-mb="${id}">
                    <div class="mb-chipset">${mb.name.split('(')[1]?.replace(')', '') || mb.name}</div>
                    <div class="mb-socket">${mb.socket}</div>
                    <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 5px;">${mb.year}</div>
                </div>
            `).join('');
        }

        function selectMotherboard(id) {
            selectedMb = { id, ...integratedDB[id] };
            
            document.querySelectorAll('.mb-card').forEach(card => card.classList.remove('selected'));
            document.querySelector(`[data-mb="${id}"]`).classList.add('selected');
            
            const info = document.getElementById('integratedInfo');
            const details = document.getElementById('integratedDetails');
            
            info.classList.remove('hidden');
            details.innerHTML = `
                <div style="display: grid; gap: 8px;">
                    <div><strong>الكرت المدمج:</strong> <span style="color: var(--integrated)">${selectedMb.igpu}</span></div>
                    <div><strong>أداء الرسوميات:</strong> <span style="color: ${selectedMb.igpuScore > 20 ? 'var(--success)' : selectedMb.igpuScore > 10 ? 'var(--warning)' : 'var(--danger)'}">${selectedMb.igpuScore}/100</span></div>
                    <div><strong>المعالجات المدعومة:</strong> ${selectedMb.cpus.join(', ')}</div>
                    ${selectedMb.note ? `<div style="color: var(--warning); font-size: 0.9rem;">⚠️ ${selectedMb.note}</div>` : ''}
                </div>
            `;
        }

        // ==================== GAMES ====================
        function populateGames() {
            const grid = document.getElementById('gamesGrid');
            const filtered = currentGameFilter === 'all' 
                ? gamesDB 
                : gamesDB.filter(g => g.genre === currentGameFilter);
            
            grid.innerHTML = filtered.map(game => `
                <div class="game-card" onclick="selectGame('${game.id}')" data-game="${game.id}">
                    <span class="game-icon">${game.icon}</span>
                    <div class="game-name">${game.name}</div>
                    <div class="game-genre">${getGenreName(game.genre)}</div>
                    <div class="game-year">${game.year}</div>
                </div>
            `).join('');
        }

        function getGenreName(genre) {
            const names = {
                'fps': 'FPS', 'battle_royale': 'Battle Royale', 'rpg': 'RPG',
                'open_world': 'Open World', 'sports': 'Sports', 'strategy': 'Strategy',
                'racing': 'Racing', 'simulation': 'Simulation', 'indie': 'Indie'
            };
            return names[genre] || genre;
        }

        function filterGames(genre) {
            currentGameFilter = genre;
            
            document.querySelectorAll('.filter-chip').forEach(chip => chip.classList.remove('active'));
            event.target.classList.add('active');
            
            populateGames();
            updateGameCount();
        }

        function updateGameCount() {
            const count = currentGameFilter === 'all' 
                ? gamesDB.length 
                : gamesDB.filter(g => g.genre === currentGameFilter).length;
            document.getElementById('gamesCount').textContent = count;
        }

        function selectGame(gameId) {
            selectedGame = gamesDB.find(g => g.id === gameId);
            
            document.querySelectorAll('.game-card').forEach(card => card.classList.remove('selected'));
            document.querySelector(`[data-game="${gameId}"]`).classList.add('selected');
            document.getElementById('checkBtn').disabled = false;
        }

        // ==================== NAVIGATION ====================
        function goToStep1() {
            document.getElementById('section1').classList.remove('hidden');
            document.getElementById('section2').classList.add('hidden');
            document.getElementById('section3').classList.add('hidden');
            updateSteps(1);
        }

        function goToStep2() {
            if (!selectedCpu) {
                alert('الرجاء اختيار المعالج أولاً');
                return;
            }
            
            if (gpuType === 'dedicated' && !selectedGpu) {
                alert('الرجاء اختيار كرت الشاشة المنفصل أو التبديل للكرت المدمج');
                return;
            }
            
            if (gpuType === 'integrated' && !selectedMb) {
                alert('الرجاء اختيار نوع اللوحة الأم');
                return;
            }
            
            const ram = document.getElementById('ramSelect').value;
            if (!ram) {
                alert('الرجاء اختيار كمية الرام');
                return;
            }

            userSpecs = {
                cpu: selectedCpu.score,
                gpu: gpuType === 'dedicated' ? selectedGpu.score : selectedMb.igpuScore,
                gpuName: gpuType === 'dedicated' ? selectedGpu.name : selectedMb.igpu,
                gpuVram: gpuType === 'dedicated' ? selectedGpu.vram : 'مشترك',
                ram: parseInt(ram),
                storage: document.getElementById('storageSelect').value,
                isIntegrated: gpuType === 'integrated',
                mbName: gpuType === 'integrated' ? selectedMb.name : null
            };

            document.getElementById('section1').classList.add('hidden');
            document.getElementById('section2').classList.remove('hidden');
            document.getElementById('section3').classList.add('hidden');
            updateSteps(2);
        }

        function updateSteps(step) {
            document.querySelectorAll('.step').forEach((el, index) => {
                el.classList.remove('active', 'completed');
                if (index + 1 < step) {
                    el.classList.add('completed');
                } else if (index + 1 === step) {
                    el.classList.add('active');
                }
            });
        }

        function checkCompatibility() {
            if (!selectedGame) return;

            const loading = document.getElementById('loadingOverlay');
            const loadingSub = document.getElementById('loadingSub');
            
            loading.classList.add('show');
            
            const messages = [
                'تحليل مواصفات المعالج...',
                'تقييم أداء كرت الشاشة...',
                'مقارنة متطلبات اللعبة...',
                'حساب معدل الإطارات المتوقع...',
                'إعداد التقرير النهائي...'
            ];
            
            let msgIndex = 0;
            const msgInterval = setInterval(() => {
                if (msgIndex < messages.length) {
                    loadingSub.textContent = messages[msgIndex];
                    msgIndex++;
                }
            }, 400);

            setTimeout(() => {
                clearInterval(msgInterval);
                loading.classList.remove('show');
                
                document.getElementById('section2').classList.add('hidden');
                document.getElementById('section3').classList.remove('hidden');
                updateSteps(3);
                
                showResults();
            }, 2500);
        }

        // ==================== RESULTS ====================
        function showResults() {
            const game = selectedGame;
            const specs = userSpecs;
            
            // Calculate performance ratios
            const cpuRatio = specs.cpu / game.recCpu;
            const gpuRatio = specs.gpu / game.recGpu;
            const ramRatio = specs.ram / game.recRam;
            
            // Integrated GPU penalty for modern games
            let gpuPenalty = 1;
            if (specs.isIntegrated && game.year >= 2020) {
                gpuPenalty = 0.7;
            }
            
            const overallScore = Math.min(cpuRatio, gpuRatio * gpuPenalty, ramRatio) * 100;
            
            // Determine result
            let result, resultClass, resultText, resultIcon;
            let resolution, settings, fps;
            let tips = [];
            let integratedWarning = '';

            if (specs.isIntegrated) {
                integratedWarning = `
                    <div style="background: rgba(245, 158, 11, 0.1); border: 2px solid var(--warning); border-radius: 12px; padding: 15px; margin-bottom: 20px; text-align: center;">
                        <div style="font-weight: 800; color: var(--warning); margin-bottom: 5px;">⚠️ تحذير: كرت مدمج</div>
                        <div style="font-size: 0.9rem;">أنت تستخدم كرت رسوميات مدمج (${specs.gpuName}). الألعاب الحديثة قد لا تعمل بشكل جيد.</div>
                    </div>
                `;
            }

            if (overallScore >= 100) {
                result = 'excellent';
                resultClass = 'badge-success';
                resultText = '✅ يشغّل بأداء ممتاز!';
                resultIcon = '🎉';
                
                if (overallScore >= 130) {
                    resolution = '4K (2160p)';
                    settings = 'Ultra / Max';
                    fps = '60+';
                } else {
                    resolution = '1440p (2K)';
                    settings = 'Ultra / High';
                    fps = '60-120';
                }
                
                tips = [
                    'جهازك قوي جداً! يمكنك تشغيل اللعبة بأعلى الإعدادات',
                    specs.isIntegrated ? 'رغم استخدامك كرت مدمج، الأداء ممتاز لهذه اللعبة!' : 'جرب تفعيل Ray Tracing إذا كانت اللعبة تدعمه',
                    'استخدم شاشة بدقة 1440p أو 4K للاستفادة القصوى'
                ];
            } else if (overallScore >= 75) {
                result = 'good';
                resultClass = 'badge-success';
                resultText = '✅ يشغّل بأداء جيد';
                resultIcon = '👍';
                
                resolution = '1080p';
                settings = 'High / Medium';
                fps = '60';
                
                tips = [
                    'اللعبة ستعمل بشكل جيد على إعدادات High',
                    'يمكنك رفع بعض الإعدادات إذا لم تكن حساسة لها',
                    'تأكد من تحديث تعريفات كرت الشاشة'
                ];
            } else if (overallScore >= 50) {
                result = 'medium';
                resultClass = 'badge-warning';
                resultText = '⚠️ يشغّل بإعدادات متوسطة';
                resultIcon = '🔧';
                
                resolution = '1080p';
                settings = 'Medium / Low';
                fps = '30-60';
                
                tips = [
                    'خفض إعدادات الظلال (Shadows) يحسن الأداء كثيراً',
                    'عطل Anti-Aliasing أو اختر FXAA بدلاً من MSAA',
                    'خفض مسافة الرؤية (Draw Distance) إذا لزم الأمر'
                ];
            } else if (overallScore >= 30) {
                result = 'low';
                resultClass = 'badge-warning';
                resultText = '⚠️ يشغّل بصعوبة - إعدادات منخفضة';
                resultIcon = '🐢';
                
                resolution = '720p';
                settings = 'Low';
                fps = '20-30';
                
                tips = [
                    'اللعبة ستعمل بصعوبة - توقع تقطعات',
                    'خفض الدقة إلى 720p يحسن الأداء بشكل كبير',
                    'أغلق جميع البرامج الأخرى أثناء اللعب',
                    'تأكد من تفعيل Game Mode في Windows'
                ];
            } else {
                result = 'fail';
                resultClass = 'badge-danger';
                resultText = '❌ لا يشغّل - مواصفات غير كافية';
                resultIcon = '❌';
                
                resolution = 'غير متوافق';
                settings = 'غير متوافق';
                fps = 'غير متوافق';
                
                tips = [
                    'جهازك لا يستوفي الحد الأدنى من المتطلبات',
                    specs.isIntegrated ? 'الكرت المدمج غير كافٍ لهذه اللعبة - تحتاج كرت منفصل' : 'تحتاج لترقية كرت الشاشة أو المعالج',
                    'يمكنك تجربة اللعبة على خدمات البث السحابي (GeForce NOW)',
                    'تأكد من متطلبات اللعبة قبل الشراء'

            // Calculate FPS estimate
            let fpsEstimate = 0;
            if (result !== 'fail') {
                fpsEstimate = Math.round(25 + (overallScore * 0.8));
                if (fpsEstimate > 144) fpsEstimate = 144;
                if (fpsEstimate < 15) fpsEstimate = 15;

            const storageBonus = specs.storage === 'nvme' ? 5 : specs.storage === 'sata_ssd' ? 3 : 0;

                    <div class="perf-card">
                        <div class="perf-label">إعدادات الرسوميات</div>

                        <div class="perf-sub">Graphics Settings</div>
                    </div>
                    
                    <div class="perf-card">

                        <div class="perf-sub">Frames Per Second</div>
                        ${result !== 'fail' ? `

                                        ${specs.cpu >= game.recCpu ? '✅ يتجاوز' : specs.cpu >= game.minCpu ? '⚠️ مقبول' : '❌ غير كافٍ'}
                                    </span>
                                </td>
                            </tr>
                            <tr>
                                <td>كرت الشاشة (GPU)</td>
                                <td class="spec-yours">
                                    ${specs.isIntegrated ? `<span style="color: var(--integrated)">[مدمج]</span> ` : ''}${specs.gpuName}
                                    <br><small style="color: var(--text-muted)">أداء: ${specs.gpu}/100 ${!specs.isIntegrated ? `| VRAM: ${specs.gpuVram}GB` : ''}</small>

                            <div class="setting-value ${result === 'fail' ? 'setting-low' : result === 'low' ? 'setting-low' : result === 'medium' ? 'setting-medium' : 'setting-high'}">${result === 'fail' ? 'N/A' : result === 'low' ? 'Low' : result === 'medium' ? 'Medium' : 'High'}</div>
                        </div>
                        <div class="setting-item">
                            <div class="setting-name">Effects</div>
                            <div class="setting-value ${result === 'fail' ? 'setting-low' : result === 'low' ? 'setting-low' : result === 'medium' ? 'setting-medium' : 'setting-high'}">${result === 'fail' ? 'N/A' : result === 'low' ? 'Low' : result === 'medium' ? 'Medium' : 'High'}</div>
                        </div>
                        <div class="setting-item">
                            <div class="setting-name">Post-Processing</div>
                            <div class="setting-value ${result === 'fail' ? 'setting-low' : result === 'low' ? 'setting-low' : result === 'medium' ? 'setting-medium' : 'setting-high'}">${result === 'fail' ? 'N/A' : result === 'low' ? 'Low' : result === 'medium' ? 'Medium' : 'High'}</div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <h2 class="card-title">
                        <span class="icon">📈</span>
                        تقييم الأداء العام
                    </h2>
                    <div class="perf-bar" style="height: 20px; margin-top: 20px;">
                        <div class="perf-bar-fill" style="width: ${Math.min(overallScore, 100)}%; background: ${overallScore >= 75 ? 'var(--success)' : overallScore >= 50 ? 'var(--warning)' : 'var(--danger)'};"></div>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-top: 10px; font-size: 0.9rem; color: var(--text-muted);">
                        <span>ضعيف</span>
                        <span>متوسط</span>
                        <span>جيد</span>
                        <span>ممتاز</span>
                    </div>
                    <div style="text-align: center; margin-top: 15px; font-size: 1.2rem; font-weight: 800;">
                        النتيجة: <span style="color: ${overallScore >= 75 ? 'var(--success)' : overallScore >= 50 ? 'var(--warning)' : 'var(--danger)'}">${Math.round(overallScore)}%</span>
                    </div>
                </div>
            `;

            const resultSection = document.getElementById('resultSection');
            resultSection.innerHTML = resultHTML;
            resultSection.classList.add('show');
        }

        function resetAll() {
            selectedGame = null;
            userSpecs = {};
            selectedCpu = null;
            selectedGpu = null;
            selectedMb = null;
            gpuType = 'dedicated';
            
            document.getElementById('cpuSelected').classList.add('hidden');
            document.getElementById('gpuSelected').classList.add('hidden');
            document.getElementById('cpuSearch').value = '';
            document.getElementById('gpuSearch').value = '';
            document.getElementById('ramSelect').value = '';
            document.getElementById('storageSelect').value = 'nvme';
            
            document.querySelectorAll('.mb-card').forEach(card => card.classList.remove('selected'));
            document.getElementById('integratedInfo').classList.add('hidden');
            
            setGpuType('dedicated');
            
            document.querySelectorAll('.game-card').forEach(card => card.classList.remove('selected'));
            document.getElementById('checkBtn').disabled = true;
            
            document.getElementById('section3').classList.add('hidden');
            document.getElementById('resultSection').classList.remove('show');
            document.getElementById('resultSection').innerHTML = '';
            
            currentGameFilter = 'all';
            document.querySelectorAll('.filter-chip').forEach((chip, i) => {
                chip.classList.toggle('active', i === 0);
            });
            populateGames();
            
            goToStep1();
        }
    </script>
</body>
</html>
