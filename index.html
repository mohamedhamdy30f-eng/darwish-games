<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دارويش جيمز</title>

<style>
body{
    font-family: Arial,sans-serif;
    background:#111;
    color:white;
    text-align:center;
    margin:0;
}

header{
    background:#222;
    padding:20px;
}

h1{
    margin:0;
}

.game-container{
    margin-top:30px;
}

.board{
    display:grid;
    grid-template-columns:repeat(3,100px);
    gap:5px;
    justify-content:center;
    margin:20px auto;
}

.cell{
    width:100px;
    height:100px;
    background:#333;
    font-size:40px;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
}

button{
    padding:10px 20px;
    border:none;
    background:#00aaff;
    color:white;
    border-radius:5px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>🎮 Darwish Games</h1>
<p>موقع ألعاب متصفح مجاني</p>
</header>

<div class="game-container">
<h2>لعبة XO</h2>

<div class="board" id="board">
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
</div>

<h3 id="status">دور اللاعب X</h3>

<button onclick="restartGame()">إعادة اللعب</button>
</div>

<script>
const cells = document.querySelectorAll('.cell');
const statusText = document.getElementById('status');

let currentPlayer = 'X';
let gameActive = true;

const wins = [
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
];

cells.forEach((cell,index)=>{
cell.addEventListener('click',()=>{
if(cell.textContent || !gameActive) return;

cell.textContent=currentPlayer;

checkWinner();

currentPlayer=currentPlayer==='X'?'O':'X';

if(gameActive)
statusText.textContent=`دور اللاعب ${currentPlayer}`;
});
});

function checkWinner(){

for(let win of wins){

const [a,b,c]=win;

if(
cells[a].textContent &&
cells[a].textContent===cells[b].textContent &&
cells[b].textContent===cells[c].textContent
){
statusText.textContent=
`الفائز هو ${cells[a].textContent}`;
gameActive=false;
return;
}
}

let draw=true;

cells.forEach(cell=>{
if(cell.textContent==="") draw=false;
});

if(draw){
statusText.textContent="تعادل!";
gameActive=false;
}
}

function restartGame(){
cells.forEach(cell=>cell.textContent="");
currentPlayer='X';
gameActive=true;
statusText.textContent='دور اللاعب X';
}
</script>

</body>
</html>
