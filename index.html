<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playnix</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
}

header{
padding:20px;
text-align:center;
background:#111827;
border-bottom:2px solid #2563eb;
}

.logo{
font-size:40px;
font-weight:bold;
}

.hero{
text-align:center;
padding:60px 20px;
}

.hero h1{
font-size:50px;
margin-bottom:15px;
}

.hero p{
font-size:20px;
color:#cbd5e1;
}

.games{
padding:30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
text-align:center;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.icon{
font-size:60px;
margin-bottom:10px;
}

.play-btn{
display:inline-block;
margin-top:15px;
padding:10px 20px;
background:#2563eb;
color:white;
text-decoration:none;
border-radius:8px;
}

footer{
text-align:center;
padding:20px;
margin-top:40px;
background:#111827;
}
</style>
</head>

<body>

<header>
<div class="logo">🎮 Playnix</div>
</header>

<section class="hero">
<h1>مرحبًا بك في Playnix</h1>
<p>العب ألعاب المتصفح مجانًا وبدون تحميل</p>
</section>

<section class="games">

<div class="card">
<div class="icon">❌⭕</div>
<h2>XO</h2>
<p>لعبة الذكاء الشهيرة</p>
<a class="play-btn" href="#">قريبًا</a>
</div>

<div class="card">
<div class="icon">🐍</div>
<h2>Snake</h2>
<p>اجمع النقاط وكبر الثعبان</p>
<a class="play-btn" href="#">قريبًا</a>
</div>

<div class="card">
<div class="icon">🚗</div>
<h2>Racing</h2>
<p>تسابق نحو المركز الأول</p>
<a class="play-btn" href="#">قريبًا</a>
</div>

<div class="card">
<div class="icon">🧩</div>
<h2>Puzzle</h2>
<p>اختبر ذكاءك</p>
<a class="play-btn" href="#">قريبًا</a>
</div>

</section>

<footer>
© 2026 Playnix - All Rights Reserved
</footer>

</body>
</html>
